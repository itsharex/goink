name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'ci-*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
        shell: bash

      - name: Install sqlite3 headers (CGo)
        shell: bash
        run: |
          curl -fsSL -o /tmp/sqlite-amalgamation.zip https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip
          unzip -qo /tmp/sqlite-amalgamation.zip -d /tmp/sqlite
          echo "CGO_CFLAGS=-I/tmp/sqlite" >> $GITHUB_ENV

      - name: Download runtime deps
        run: |
          bash scripts/download-git.sh
          bash scripts/download-onnx.sh
        shell: bash

      - name: Build
        shell: bash
        run: |
          cd frontend && npm ci && npm run build && cd ..
          wails build -tags webkit2_41 -o goink.exe

      - name: Package (NSIS)
        run: makensis -DVERSION=${GITHUB_REF_NAME#v} build/package/windows/installer.nsi

      - name: Checksum
        shell: bash
        run: cd build/dist && sha256sum *.exe > sha256sums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download runtime deps
        run: |
          bash scripts/download-git.sh
          bash scripts/download-onnx.sh

      - name: Build
        run: |
          cd frontend && npm ci && npm run build && cd ..
          wails build -tags webkit2_41 -o goink

      - name: Package (AppImage)
        run: bash build/package/linux/build-appimage.sh ${GITHUB_REF_NAME#v}

      - name: Checksum
        run: cd build/dist && sha256sum *.AppImage > sha256sums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download runtime deps
        run: |
          bash scripts/download-git.sh
          bash scripts/download-onnx.sh

      - name: Build
        run: |
          cd frontend && npm ci && npm run build && cd ..
          wails build -tags webkit2_41 -o goink

      - name: Package (DMG)
        run: bash build/package/macos/build-dmg.sh ${GITHUB_REF_NAME#v}

      - name: Checksum
        run: cd build/dist && shasum -a 256 *.dmg > sha256sums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/dist/*

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir dist
          cp windows/* dist/ 2>/dev/null || true
          cp linux/* dist/ 2>/dev/null || true
          cp macos/* dist/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
